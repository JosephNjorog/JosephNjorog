name: 🚀 Update README — Deployed Projects

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Manual trigger from Actions tab
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-readme.yml" # Auto-runs when this file is pushed/updated

permissions:
  contents: write

jobs:
  update-readme:
    name: Fetch Deployed Repos (Public + Private) & Update README
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so we can also read private repos and push back
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch all repos (public + private) and update README
        run: |
          node << 'EOF'
          const https = require("https");
          const fs = require("fs");

          const USERNAME = "JosephNjorog";

          // ✅ PAT_TOKEN gives access to BOTH public and private repos
          // The /user/repos endpoint with affiliation=owner returns everything you own
          const HEADERS = {
            "User-Agent": "readme-updater",
            Authorization: `token ${process.env.PAT_TOKEN}`,
            Accept: "application/vnd.github.v3+json",
          };

          function fetchAllRepos(page = 1, accumulated = []) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: "api.github.com",
                // ✅ KEY CHANGE: /user/repos instead of /users/{username}/repos
                // /user/repos with the PAT returns ALL repos including private ones
                // affiliation=owner ensures we only get repos you own (not org repos you're a member of)
                // visibility=all ensures both public and private are returned
                path: `/user/repos?affiliation=owner&visibility=all&sort=updated&per_page=100&page=${page}`,
                headers: HEADERS,
              };
              const req = https.get(options, (res) => {
                let data = "";
                res.on("data", (chunk) => (data += chunk));
                res.on("end", () => {
                  try {
                    const repos = JSON.parse(data);
                    if (!Array.isArray(repos)) {
                      console.error("❌ Unexpected API response:", data.slice(0, 300));
                      return resolve(accumulated);
                    }
                    const merged = [...accumulated, ...repos];
                    if (repos.length === 100) {
                      fetchAllRepos(page + 1, merged).then(resolve).catch(reject);
                    } else {
                      resolve(merged);
                    }
                  } catch (e) {
                    console.error("❌ JSON parse error:", e.message);
                    resolve(accumulated);
                  }
                });
              });
              req.on("error", (e) => {
                console.error("❌ Request error:", e.message);
                reject(e);
              });
            });
          }

          const LANG_ICONS = {
            JavaScript: "![JS](https://img.shields.io/badge/-JavaScript-F7DF1E?style=flat&logo=javascript&logoColor=000)",
            TypeScript: "![TS](https://img.shields.io/badge/-TypeScript-3178C6?style=flat&logo=typescript&logoColor=fff)",
            Python:     "![Python](https://img.shields.io/badge/-Python-3776AB?style=flat&logo=python&logoColor=fff)",
            HTML:       "![HTML](https://img.shields.io/badge/-HTML-E34F26?style=flat&logo=html5&logoColor=fff)",
            CSS:        "![CSS](https://img.shields.io/badge/-CSS-1572B6?style=flat&logo=css3&logoColor=fff)",
            Solidity:   "![Solidity](https://img.shields.io/badge/-Solidity-363636?style=flat&logo=solidity&logoColor=fff)",
            Shell:      "![Shell](https://img.shields.io/badge/-Shell-4EAA25?style=flat&logo=gnu-bash&logoColor=fff)",
            C:          "![C](https://img.shields.io/badge/-C-A8B9CC?style=flat&logo=c&logoColor=000)",
            Vue:        "![Vue](https://img.shields.io/badge/-Vue-4FC08D?style=flat&logo=vue.js&logoColor=fff)",
            Rust:       "![Rust](https://img.shields.io/badge/-Rust-000000?style=flat&logo=rust&logoColor=fff)",
            Go:         "![Go](https://img.shields.io/badge/-Go-00ADD8?style=flat&logo=go&logoColor=fff)",
            Dart:       "![Dart](https://img.shields.io/badge/-Dart-0175C2?style=flat&logo=dart&logoColor=fff)",
            Java:       "![Java](https://img.shields.io/badge/-Java-007396?style=flat&logo=java&logoColor=fff)",
            PHP:        "![PHP](https://img.shields.io/badge/-PHP-777BB4?style=flat&logo=php&logoColor=fff)",
          };

          fetchAllRepos()
            .then((repos) => {
              console.log(`📦 Total repos fetched: ${repos.length}`);

              // Separate public and private for logging
              const publicRepos  = repos.filter((r) => !r.private);
              const privateRepos = repos.filter((r) => r.private);
              console.log(`   🔓 Public: ${publicRepos.length}  🔒 Private: ${privateRepos.length}`);

              // Filter: has a homepage URL, not a fork, not the profile repo itself
              const deployed = repos
                .filter((r) =>
                  r.homepage &&
                  r.homepage.trim() !== "" &&
                  !r.fork &&
                  r.name !== USERNAME
                )
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .slice(0, 8); // Show up to 8 most recently updated deployed projects

              console.log(`🚀 Deployed repos found: ${deployed.length}`);
              deployed.forEach((r) =>
                console.log(`   → [${r.private ? "🔒 private" : "🔓 public"}] ${r.name}: ${r.homepage}`)
              );

              let section;

              if (deployed.length === 0) {
                section =
                  `<!-- DEPLOYED-PROJECTS:START -->\n` +
                  `| 📦 Repository | 📝 Description | 🛠 Language | 🔒 | 🌍 Live |\n` +
                  `|:---|:---|:---:|:---:|:---:|\n` +
                  `| _No deployed projects found yet_ | Go to any repo → ⚙️ About → add a **Website URL** to show it here! | — | — | — |\n` +
                  `<!-- DEPLOYED-PROJECTS:END -->`;
              } else {
                const rows = deployed.map((r) => {
                  const langBadge =
                    LANG_ICONS[r.language] ||
                    (r.language ? `\`${r.language}\`` : "`—`");
                  const desc = r.description
                    ? r.description.slice(0, 68) +
                      (r.description.length > 68 ? "…" : "")
                    : "_No description_";
                  const stars =
                    r.stargazers_count > 0 ? ` ⭐${r.stargazers_count}` : "";
                  const live = r.homepage.startsWith("http")
                    ? r.homepage
                    : `https://${r.homepage}`;
                  // For private repos, link to homepage only (repo URL is private)
                  const repoLink = r.private
                    ? `**${r.name}**${stars}`
                    : `[**${r.name}**](${r.html_url})${stars}`;
                  const visibility = r.private ? "🔒" : "🔓";
                  return `| ${repoLink} | ${desc} | ${langBadge} | ${visibility} | [🔗 Live](${live}) |`;
                });

                const table = [
                  "| 📦 Repository | 📝 Description | 🛠 Language | 🔒 | 🌍 Live |",
                  "|:---|:---|:---:|:---:|:---:|",
                  ...rows,
                ].join("\n");

                section =
                  `<!-- DEPLOYED-PROJECTS:START -->\n${table}\n<!-- DEPLOYED-PROJECTS:END -->`;
              }

              const readmePath = "README.md";
              let readme = fs.readFileSync(readmePath, "utf8");

              if (!readme.includes("<!-- DEPLOYED-PROJECTS:START -->")) {
                console.error("❌ Markers not found in README.md — ensure <!-- DEPLOYED-PROJECTS:START --> and <!-- DEPLOYED-PROJECTS:END --> exist.");
                process.exit(1);
              }

              readme = readme.replace(
                /<!-- DEPLOYED-PROJECTS:START -->[\s\S]*?<!-- DEPLOYED-PROJECTS:END -->/,
                section
              );
              fs.writeFileSync(readmePath, readme);
              console.log(`✅ README updated with ${deployed.length} deployed project(s).`);
            })
            .catch((err) => {
              console.error("❌ Fatal error:", err);
              process.exit(1);
            });
          EOF
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "⏭ No changes to commit" || (git commit -m "chore: 🚀 auto-update deployed projects [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
